dryrun: false
data:
  _target_: walkjump.data.AbDataModule_toy
  csv_data_path: /home/srinu_pd/walk-jump/data/discrete_constrained_5d.csv
  batch_size: 64
  num_workers: 1
model:
  model_cfg:
    arch:
      _target_: walkjump.model.arch.ByteNetArch_sig
      n_tokens: 21
      d_model: 128
      n_layers: 8
      kernel_size: 3
      max_dilation: 128
      slim: true
      activation: silu
      final_layernorm: true
    hyperparameters:
      lr: 0.001
      weight_decay: 0.01
      sigma: 0.1
      warmup_batches: 1
      lr_start_factor: 0.1
  _target_: walkjump.model.PredModelSig
callbacks:
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: checkpoints_sigpred_0.1_5D
    filename: '{epoch}-{step}-{val_loss:.4f}'
    monitor: val_loss
    save_top_k: -1
    mode: min
    verbose: true
    save_last: true
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val_loss
    min_delta: 0
    patience: 200
    mode: min
  lr_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
logger:
  _target_: lightning.pytorch.loggers.WandbLogger
  save_dir: .
  offline: false
  project: null
  entity: null
  group: null
  notes: null
  tags: null
trainer:
  _target_: lightning.pytorch.Trainer
  accelerator: gpu
  devices: 1
  num_nodes: 1
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0
  gradient_clip_algorithm: norm
  precision: 32
  max_epochs: 10000
  max_steps: -1
  val_check_interval: 0.99
setup:
  torch:
    _target_: torch.set_float32_matmul_precision
    precision: medium
  seed:
    _target_: lightning.pytorch.seed_everything
    seed: 252850890
    workers: true
